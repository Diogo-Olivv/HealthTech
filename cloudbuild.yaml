substitutions:
  _REGION: southamerica-east1
  _AR_REPO: healthtech
  _BACKEND_SERVICE: healthtech-backend
  _FRONTEND_SERVICE: healthtech-frontend
  # Service account criada pelo infra/setup-gcp.sh
  _CR_SA: healthtech-cloudrun@health-tech-ai-lab.iam.gserviceaccount.com
  # BOOTSTRAP: na primeira execução deixe _BACKEND_URL vazio e rode apenas o
  # deploy do backend. Copie a URL gerada, preencha aqui (ou passe via
  # --substitutions) e rode o pipeline completo.
  _BACKEND_URL: ''          # Ex: https://healthtech-backend-xxxx-uc.a.run.app
  _CLOUDSQL_CONNECTION: 'health-tech-ai-lab:southamerica-east1:health-tech-db'
  # DB_SYNC=true apenas no primeiro deploy para criar as tabelas. Remova depois.
  _DB_SYNC: 'false'

steps:
  # Autentica Docker com Artifact Registry antes de qualquer push
  - name: gcr.io/google.com/cloudsdktool/cloud-sdk
    id: auth-docker
    waitFor: ['-']
    entrypoint: gcloud
    args:
      - auth
      - configure-docker
      - $_REGION-docker.pkg.dev
      - --quiet

  # Build das imagens em paralelo
  - name: gcr.io/cloud-builders/docker
    id: build-backend
    waitFor: [auth-docker]
    args:
      - build
      - -t
      - $_REGION-docker.pkg.dev/$PROJECT_ID/$_AR_REPO/backend:$BUILD_ID
      - -t
      - $_REGION-docker.pkg.dev/$PROJECT_ID/$_AR_REPO/backend:latest
      - ./backend

  - name: gcr.io/cloud-builders/docker
    id: build-frontend
    waitFor: [auth-docker]
    args:
      - build
      - -t
      - $_REGION-docker.pkg.dev/$PROJECT_ID/$_AR_REPO/frontend:$BUILD_ID
      - -t
      - $_REGION-docker.pkg.dev/$PROJECT_ID/$_AR_REPO/frontend:latest
      - --build-arg
      - NEXT_PUBLIC_API_URL=$_BACKEND_URL
      - ./frontend

  # Push em paralelo, cada um aguarda apenas seu respectivo build
  - name: gcr.io/cloud-builders/docker
    id: push-backend
    waitFor: [build-backend]
    args: [push, --all-tags, $_REGION-docker.pkg.dev/$PROJECT_ID/$_AR_REPO/backend]

  - name: gcr.io/cloud-builders/docker
    id: push-frontend
    waitFor: [build-frontend]
    args: [push, --all-tags, $_REGION-docker.pkg.dev/$PROJECT_ID/$_AR_REPO/frontend]

  # Deploy backend (aguarda push do backend)
  - name: gcr.io/google.com/cloudsdktool/cloud-sdk
    id: deploy-backend
    waitFor: [push-backend]
    timeout: 300s
    entrypoint: gcloud
    args:
      - run
      - deploy
      - $_BACKEND_SERVICE
      - --image=$_REGION-docker.pkg.dev/$PROJECT_ID/$_AR_REPO/backend:$BUILD_ID
      - --region=$_REGION
      - --platform=managed
      - --allow-unauthenticated
      - --service-account=$_CR_SA
      - --port=3001
      - --memory=512Mi
      - --cpu=1
      - --min-instances=0
      - --max-instances=5
      - --add-cloudsql-instances=$_CLOUDSQL_CONNECTION
      - --set-env-vars=NODE_ENV=production,INSTANCE_CONNECTION_NAME=$_CLOUDSQL_CONNECTION,DB_SYNC=$_DB_SYNC
      - --set-secrets=JWT_SECRET=jwt-secret:latest,DB_USER=db-user:latest,DB_PASSWORD=db-password:latest,DB_NAME=db-name:latest,GCS_BUCKET_NAME=gcs-bucket-name:latest,FRONTEND_URL=frontend-url:latest

  # Deploy frontend (aguarda push do frontend e deploy do backend)
  - name: gcr.io/google.com/cloudsdktool/cloud-sdk
    id: deploy-frontend
    waitFor: [push-frontend, deploy-backend]
    timeout: 300s
    entrypoint: gcloud
    args:
      - run
      - deploy
      - $_FRONTEND_SERVICE
      - --image=$_REGION-docker.pkg.dev/$PROJECT_ID/$_AR_REPO/frontend:$BUILD_ID
      - --region=$_REGION
      - --platform=managed
      - --allow-unauthenticated
      - --service-account=$_CR_SA
      - --port=3000
      - --memory=512Mi
      - --cpu=1
      - --min-instances=0
      - --max-instances=5

images:
  - $_REGION-docker.pkg.dev/$PROJECT_ID/$_AR_REPO/backend:$BUILD_ID
  - $_REGION-docker.pkg.dev/$PROJECT_ID/$_AR_REPO/frontend:$BUILD_ID

options:
  logging: GCS_ONLY
